name: Deploy

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-preview:
    name: Deploy Preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-scaffold/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend-scaffold

      - name: Pull Vercel environment
        run: npx vercel pull --yes --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: npx vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(npx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

      - name: Verify deployment
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        run: npx tsx scripts/verify-deployment.ts

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const prNumber = context.issue.number;
            if (!prNumber) {
              console.log('Not a PR, skipping comment');
              return;
            }
            const body = `## Preview Deployment\n\n**URL:** ${url}\n\n_This preview was automatically deployed from branch \`${context.ref}\`._`;
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  deploy-production:
    name: Deploy Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://stellar-tipz.vercel.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-scaffold/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend-scaffold

      - name: Pull Vercel environment
        run: npx vercel pull --yes --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project for production
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel production
        id: deploy
        run: |
          URL=$(npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

      - name: Verify deployment
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        run: npx tsx scripts/verify-deployment.ts

      - name: Notify deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const status = '${{ job.status }}';
            const ref = '${{ github.ref }}';
            const sha = '${{ github.sha }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const message = `${emoji} Production deployment ${status}\n\n**Ref:** ${ref}\n**SHA:** ${sha.slice(0, 7)}\n**URL:** ${url}`;
            console.log(message);

  verify-deployment:
    name: Post-Deployment Verification
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [deploy-production]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://stellar-tipz.vercel.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run smoke tests
        env:
          DEPLOYMENT_URL: https://stellar-tipz.vercel.app
        run: npx tsx scripts/verify-deployment.ts

      - name: Trigger rollback on failure
        if: failure()
        run: |
          echo "::error::Deployment verification failed, triggering rollback"
          npx vercel rollback --token=${{ secrets.VERCEL_TOKEN }} --yes

  rollback:
    name: Rollback
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [deploy-production]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rollback Vercel deployment
        run: |
          npx vercel rollback --token=${{ secrets.VERCEL_TOKEN }} --yes
          echo "Rolled back to previous deployment"
