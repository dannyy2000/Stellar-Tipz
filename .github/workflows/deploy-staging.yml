name: Deploy to Staging

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-scaffold/package-lock.json

      - name: Install dependencies
        working-directory: frontend-scaffold
        run: npm ci

      - name: Build for staging
        working-directory: frontend-scaffold
        env:
          NODE_ENV: production
          VITE_APP_ENV: staging
          GIT_COMMIT: ${{ github.sha }}
          BUILD_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
        run: |
          cp .env.staging .env
          npm run build

      - name: Deploy to Vercel (Staging)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend-scaffold
          scope: ${{ secrets.VERCEL_ORG_ID }}
          alias-domains: staging.tipz.app

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Staging deployment complete! View at: https://staging.tipz.app'
            })
