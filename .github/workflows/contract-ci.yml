name: Contract CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  contract-checks:
    name: Soroban Contract CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check

      - name: cargo test
        run: cargo test

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo fmt
        run: cargo fmt -- --check

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit (security vulnerabilities)
        run: cargo audit
        continue-on-error: false

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: cargo deny (licenses and dependencies)
        run: cargo deny check
        continue-on-error: false

      - name: Install soroban-cli
        run: cargo install --locked soroban-cli

      - name: Build WASM (soroban)
        run: soroban contract build

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: soroban-wasm
          path: |
            contracts/target/wasm32-unknown-unknown/release/*.wasm
